<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta
      name="description"
      content="Site institucional da Delícias Gourmet com cardápio, história, localização e contato."
    />

    <link rel="stylesheet" href="./css/style.css" />
    <title>Delícias Gourmet</title>
  </head>

  <body>
    <header class="header">
      <a href="#inicio" class="logo" title="Página inicial">
        <img
          class="img-logo"
          src="./img/logo-delicias-gourmet.png"
          alt="Logo Delícias Gourmet"
        />
      </a>

      <div class="navigation-menu">
        <input type="checkbox" name="menu" id="menu" hidden />

        <label for="menu" class="menu-button">
          <img
            src="./img/menu-hamburguer.svg"
            alt="Abrir menu"
            class="menu-hamburguer"
          />
        </label>

        <nav class="nav-menu">
          <ul class="list-links">
            <li>
              <a href="#inicio" title="Acessar início">Início</a>
            </li>
            <li>
              <a href="#cardapio" title="Acessar cardápio">Cardápio</a>
            </li>
            <li>
              <a href="#sobre" title="Acessar sobre a empresa">Sobre Nós</a>
            </li>
            <li>
              <a href="#contato" title="Acessar contato">Contato</a>
            </li>
            <li>
              <a
                href="https://wa.me/554598352808"
                class="btn-whatsapp"
                title="Entrar em contato pelo WhatsApp"
                target="_blank"
              >
              <img src="./img/whatsapp-svgrepo-com.svg"
                  alt=""
                  class="icon-whatsapp">
                WhatsApp
              </a>
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      <section id="inicio" class="hero">
        <div class="hero-img"></div>

        <h1>Delícias Gourmet</h1>

        <hr />

        <h2>Sabor, qualidade e carinho em cada detalhe.</h2>
      </section>

      <section id="cardapio" class="cardapio">
        <!-- Conteúdo do cardápio -->
      </section>

      <section id="sobre" class="sobre-nos">
        <!-- História da empresa -->
      </section>

      <section id="contato" class="contato">
        <!-- WhatsApp, Instagram, localização e horário -->
      </section>
    </main>

    <footer class="footer">
      <!-- Rodapé -->
    </footer>
  </body>
</html>
